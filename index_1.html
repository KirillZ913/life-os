<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1216">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<title>Life OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1216;--bg2:#151B22;--s1:#171C22;--s2:#212831;--s3:#2A323D;
  --paper:#E9E6DE;--dim:#8A939D;--faint:#5A626C;--line:#2A323D;
  --barbg:rgba(15,18,22,.92);
  --acc:#D4A93C;--acc-deep:#9C7A1E;--on-acc:#181302;--acc-glow:rgba(212,169,60,.14);
  --calm:#5B7A99;--danger:#B05A4A;
}
html[data-theme="light"]{
  --bg:#F1F0EA;--bg2:#FBFAF7;--s1:#FFFFFF;--s2:#EBE9E2;--s3:#DEDBD2;
  --paper:#1D2227;--dim:#5D6570;--faint:#99A0A9;--line:#DAD7CE;
  --barbg:rgba(250,249,246,.92);
  --acc-glow:rgba(212,169,60,.22);
}
html[data-theme="light"] .card,html[data-theme="light"] .wday,html[data-theme="light"] .coin,
html[data-theme="light"] .num,html[data-theme="light"] .dcell,html[data-theme="light"] .tpl{
  box-shadow:0 1px 2px rgba(35,40,45,.08),0 6px 18px rgba(35,40,45,.07)}
html[data-theme="light"] .aurora i{opacity:.22;filter:blur(80px)}
*{box-sizing:border-box;margin:0;padding:0}
html{min-height:100%;-webkit-text-size-adjust:100%;touch-action:manipulation}
html,body{overflow-x:hidden}
*{-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:100dvh}
body{background:var(--bg);color:var(--paper);
  font-family:"IBM Plex Sans",-apple-system,system-ui,sans-serif;
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(110px + env(safe-area-inset-bottom));}
body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:radial-gradient(1100px 700px at 50% -12%,var(--bg2),var(--bg))}
#app{max-width:540px;margin:0 auto;padding:22px 16px 30px}
@media (prefers-reduced-motion:no-preference){
  #app.enter>*{animation:up .24s cubic-bezier(.2,.8,.2,1) both}
  @keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  ::view-transition-old(root){animation:vtOut .16s ease both}
  ::view-transition-new(root){animation:vtIn .2s cubic-bezier(.2,.8,.2,1) both}
  @keyframes vtOut{to{opacity:0}}
  @keyframes vtIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
}
h1{font-size:23px;font-weight:600;margin-bottom:2px;letter-spacing:-.01em}
h2{font-size:13px;font-weight:500;color:var(--dim);margin:26px 0 10px}
.mono{font-family:"JetBrains Mono",monospace}
.disp{font-family:"Unbounded",sans-serif}
.sub{color:var(--dim);font-size:14px}
.card{background:var(--s1);border-radius:18px;padding:6px 16px;margin-bottom:12px;
  box-shadow:0 1px 1px rgba(0,0,0,.18),0 8px 24px rgba(0,0,0,.14),inset 0 1px 0 rgba(255,255,255,.025);
  transition:box-shadow .25s ease,transform .25s ease}
.card.pad{padding:16px}
button{font-family:inherit;font-size:15px;font-weight:500;color:var(--paper);background:var(--s2);
  border:none;border-radius:13px;padding:12px 16px;cursor:pointer;
  transition:background .15s,transform .12s cubic-bezier(.3,1.4,.5,1);}
button:active{transform:scale(.97)}
button:hover{background:var(--s3)}
button:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
button.primary{background:var(--acc);
  background:linear-gradient(180deg,var(--acc),color-mix(in srgb,var(--acc) 80%,#000));
  color:var(--on-acc);font-weight:600;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 3px 12px var(--acc-glow)}
button.primary:hover{filter:brightness(1.06)}
button.ghost{background:transparent;color:var(--dim)}
button.ghost:hover{background:var(--s2);color:var(--paper)}
button.small{padding:7px 12px;font-size:13px;border-radius:10px}
button.wide{width:100%}
input[type=text],textarea{width:100%;background:var(--s2);border:none;border-radius:12px;
  color:var(--paper);font-family:inherit;font-size:15px;padding:12px 13px;}
input:focus-visible,textarea:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
input::placeholder,textarea::placeholder{color:var(--faint)}
textarea{resize:none;min-height:66px}
label{display:block;font-size:12.5px;color:var(--dim);margin:14px 0 6px}
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--barbg);backdrop-filter:blur(14px);
  display:flex;justify-content:space-around;padding:9px 6px calc(9px + env(safe-area-inset-bottom));}
#tabbar button{background:none;color:var(--faint);font-size:10.5px;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 12px;border-radius:12px;
  transition:background .25s ease,color .25s ease}
#tabbar button:hover{background:none;color:var(--dim)}
#tabbar button.on{background:var(--s2)}
#tabbar button .g{font-size:18px;line-height:1.15;font-family:"Unbounded";font-weight:500}
#tabbar button.on{color:var(--acc)}
.tplgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tpl{background:var(--s1);border-radius:18px;padding:16px 14px;cursor:pointer;text-align:left;
  box-shadow:0 1px 2px rgba(0,0,0,.25);transition:background .15s,transform .12s}
.tpl:hover{background:var(--s2)}
.tpl:active{transform:scale(.97)}
.tpl .k{font-family:"Unbounded";font-size:20px;color:var(--acc)}
.tpl .n{font-weight:600;margin-top:5px}
.tpl .d{font-size:12.5px;color:var(--dim);margin-top:3px;line-height:1.35}
.tpl.v .k{color:var(--calm)}
.structrow{display:flex;align-items:center;gap:10px;padding:13px 2px;cursor:pointer}
.structrow .k{font-family:"Unbounded";font-size:15px;color:var(--acc)}
.structrow .chev{margin-left:auto;color:var(--faint);transition:transform .18s}
.structrow .chev.open{transform:rotate(90deg)}
.block{display:flex;gap:12px;align-items:baseline;padding:10px 4px;cursor:pointer;border-radius:10px;transition:background .12s}
.block:hover{background:var(--s2)}
.block .idx{font-family:"JetBrains Mono";font-size:12px;color:var(--acc-deep);min-width:20px}
.block.done{opacity:.4}
.block.done .bt{text-decoration:line-through}
.task{display:flex;gap:12px;align-items:center;padding:11px 2px;cursor:pointer;border-radius:10px;transition:background .12s}
.task:hover{background:rgba(255,255,255,.02)}
.task .box{width:23px;height:23px;min-width:23px;border:1.5px solid var(--faint);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background .28s cubic-bezier(.3,1.5,.5,1),border-color .28s,transform .28s cubic-bezier(.3,1.8,.5,1)}
.task:active .box{transform:scale(.85)}
.task.done .box{background:var(--acc);border-color:var(--acc)}
.task.done .box::after{content:"✓";color:var(--on-acc);font-weight:700;font-size:13px;animation:pop .26s cubic-bezier(.3,1.7,.5,1)}
@keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.task .t{transition:color .3s ease,text-decoration-color .38s ease;
  text-decoration:line-through;text-decoration-color:transparent;text-decoration-thickness:1.5px}
.task.done .t{color:var(--faint);text-decoration-color:var(--faint)}
.task .src{font-size:11px;color:var(--acc-deep)}
.task .del{color:var(--faint);font-size:17px;padding:2px 7px;line-height:1.2;border-radius:8px;opacity:0;transition:opacity .15s}
.task:hover .del{opacity:1}
@media (hover:none){.task .del{opacity:.6}}
.quietadd{display:flex;align-items:center;gap:12px;padding:11px 2px;color:var(--faint);cursor:pointer;border-radius:10px;transition:color .15s}
.quietadd:hover{color:var(--dim)}
.quietadd .plus{width:23px;height:23px;min-width:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--s2);font-size:16px;font-weight:500}
.addrow{display:flex;gap:8px;padding:6px 0 10px;align-items:center}
.addrow input{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:7px;padding:4px 0 12px}
.result{display:flex;gap:11px;align-items:center;padding:12px 2px}
.result .rt{flex:1;cursor:pointer}
.status{font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:20px;cursor:pointer;
  min-width:88px;text-align:center;background:var(--s2);color:var(--dim);transition:all .15s}
.status.s1{color:var(--paper);background:var(--s3)}
.status.s2{color:var(--on-acc);background:var(--acc)}
.daystrip{display:flex;gap:5px;margin-top:4px}
.dcell{flex:1;position:relative;background:var(--s1);border-radius:15px;padding:10px 2px 10px;text-align:center;cursor:pointer;
  box-shadow:0 1px 1px rgba(0,0,0,.18),0 6px 16px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.025);
  transition:background .22s ease,transform .22s cubic-bezier(.3,1.4,.5,1),box-shadow .22s ease}
.dcell:hover{background:var(--s2);transform:translateY(-2px)}
.dcell:active{transform:scale(.95)}
.dcell.sel{background:var(--s2);box-shadow:0 1px 1px rgba(0,0,0,.18),0 8px 20px rgba(0,0,0,.2),inset 0 0 0 1.5px var(--acc)}
.dcell .dn{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.dcell .dnum{font-family:"Unbounded";font-size:18px;font-weight:500;margin:3px 0 0;color:var(--paper)}
.dcell.today .dnum{color:var(--acc)}
.dcell .dtpl{font-size:10.5px;color:var(--dim);height:15px;margin-top:1px}
.dcell .dtpl.v{color:var(--calm)}
.dcell .dbar{height:3px;background:var(--s3);border-radius:2px;margin:7px 7px 0;overflow:hidden}
.dcell .dbar i{display:block;height:100%;width:0;background:var(--acc);border-radius:2px;transition:width .35s cubic-bezier(.2,.8,.2,1)}
.dcell .dchk{position:absolute;top:6px;right:6px;width:15px;height:15px;border-radius:50%;
  background:var(--acc);color:var(--on-acc);font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px var(--acc-glow)}
.dcell .dt{font-family:"Unbounded";font-size:14px;margin:3px 0 1px;color:var(--paper)}
.dcell .dt.v{color:var(--calm)}
.dcell .dot{width:6px;height:6px;border-radius:50%;background:var(--s3);margin:4px auto 0}
.dcell .dot.on{background:var(--acc)}
.nextstep{font-family:"Unbounded";font-size:17px;font-weight:500;line-height:1.45;padding:4px 0 14px}
.nums{display:flex;gap:10px;margin-bottom:16px}
.num{flex:1;background:var(--s1);border-radius:16px;padding:15px 8px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.num .v{font-family:"Unbounded";font-size:24px;color:var(--acc)}
.num .l{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.3}
.wgroup{margin-bottom:20px}
.wghead{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 8px}
.wghead .wt{font-size:13px;font-weight:600;color:var(--dim)}
.verdict{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;background:var(--s2);color:var(--dim)}
.verdict.ok{color:var(--on-acc);background:var(--acc)}
.statband{display:flex;gap:20px;align-items:center;margin-top:16px;flex-wrap:wrap}
.bigstat{display:flex;gap:14px;align-items:center;flex:1;min-width:200px}
.bigstat .bn{font-family:"Unbounded";font-size:46px;font-weight:700;line-height:1;
  background:linear-gradient(160deg,var(--acc),var(--paper));-webkit-background-clip:text;background-clip:text;color:transparent}
.bigstat .bl{font-size:12.5px;color:var(--dim);line-height:1.5}
.sidestats{display:flex;flex-direction:column;gap:8px}
.sidestats>div{display:flex;align-items:baseline;gap:9px}
.sidestats b{font-size:16px;color:var(--paper)}
.sidestats span{font-size:12px;color:var(--dim)}
.mday{position:relative}
.mday .wm{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--paper)}
.mday.on{background:linear-gradient(160deg,var(--acc),var(--acc-deep));box-shadow:0 2px 8px var(--acc-glow)}
.cdate{min-width:42px;text-align:center;background:var(--s2);border-radius:11px;padding:7px 4px;height:fit-content}
.cdate b{font-family:"Unbounded";font-size:15px;display:block;line-height:1.2}
.cdate span{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.cbody{flex:1;min-width:0}
.coin{display:flex;gap:12px;background:var(--s1);border-radius:16px;padding:12px 14px;margin-bottom:9px;
  box-shadow:0 1px 1px rgba(0,0,0,.16),0 5px 14px rgba(0,0,0,.1)}
.coin.win{box-shadow:0 1px 1px rgba(0,0,0,.16),0 6px 18px var(--acc-glow),inset 0 0 0 1px var(--acc-deep);
  background:linear-gradient(120deg,color-mix(in srgb,var(--acc) 8%,var(--s1)),var(--s1) 55%)}
.coin.win .cdate{background:var(--acc)}
.coin.win .cdate b{color:var(--on-acc)}
.coin.win .cdate span{color:var(--on-acc);opacity:.75}
.coin .date{font-family:"JetBrains Mono";font-size:11px;color:var(--acc-deep)}
.coin .p{margin-top:5px;font-size:14.5px}
.coin .u{margin-top:3px;font-size:13px;color:var(--dim)}
.coin.win .p{font-family:"Unbounded";font-size:14px;color:var(--acc)}
.overlay{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:26px 18px calc(80px + env(safe-area-inset-bottom));}
@media (prefers-reduced-motion:no-preference){.overlay{animation:ovl .22s cubic-bezier(.2,.8,.2,1)}}
@keyframes ovl{from{opacity:0;transform:scale(.985)}to{opacity:1;transform:none}}
.overlay .inner{max-width:540px;margin:0 auto}
.stepnum{font-family:"JetBrains Mono";font-size:12px;color:var(--acc-deep);letter-spacing:.12em;margin-bottom:6px}
.seal-wrap{min-height:78vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.seal{width:172px;height:172px;border-radius:50%;border:3px solid var(--acc);display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:28px;box-shadow:0 0 70px var(--acc-glow), inset 0 0 34px var(--acc-glow);}
.seal::before{content:"";position:absolute;inset:9px;border:1px solid var(--acc-deep);border-radius:50%}
.seal .in{font-family:"Unbounded";font-size:16px;font-weight:700;color:var(--acc);line-height:1.35}
.seal .wm{position:absolute;bottom:26px;left:0;right:0;font-family:"JetBrains Mono";font-size:8.5px;letter-spacing:.3em;color:var(--acc-deep)}
@media (prefers-reduced-motion:no-preference){
  .seal{animation:mint .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes mint{from{transform:scale(1.25);opacity:0}to{transform:scale(1);opacity:1}}
}
.hint{font-size:13px;color:var(--dim);margin-top:8px}
.row{display:flex;gap:10px}
.row>*{flex:1}
.seg{display:flex;background:var(--s2);border-radius:12px;padding:3px;gap:3px}
.seg button{flex:1;background:transparent;padding:9px;font-size:13.5px;color:var(--dim);border-radius:9px}
.seg button.on{background:var(--s3);color:var(--paper)}
.vec{padding:13px 2px}
.vec .vn{font-weight:600;cursor:pointer}
.vec .vd{font-size:13px;color:var(--dim);margin-top:2px}
.banner{background:var(--s1);border-radius:18px;padding:15px 16px;margin-bottom:14px;font-size:14px;
  box-shadow:0 1px 2px rgba(0,0,0,.25),inset 0 0 0 1px var(--acc-deep)}
.linkline{color:var(--dim);font-size:13px;text-align:center;margin-top:18px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.empty{color:var(--faint);font-size:14px;padding:14px 4px;text-align:center}
.swatches{display:flex;gap:12px;padding:10px 0}
.sw{width:44px;height:44px;border-radius:50%;cursor:pointer;transition:transform .15s;position:relative}
.sw:active{transform:scale(.92)}
.sw.on::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700}
@media (min-width:760px){
  body{font-size:17px}
  #app{max-width:1080px;padding:36px 30px 44px}
  h1{font-size:29px}
  h2{font-size:14.5px;margin:30px 0 12px}
  .sub{font-size:15px}
  .card{padding:10px 22px;border-radius:20px}
  .card.pad{padding:22px 24px}
  button{font-size:16px;padding:13px 20px}
  .tplgrid{grid-template-columns:repeat(4,1fr);gap:12px}
  .tpl{padding:20px 16px}
  .tpl .k{font-size:24px}
  .daystrip{gap:10px}
  .wday{padding:12px 10px 8px}
  .wdhead{flex-wrap:wrap;gap:6px}
  .wdnum{font-size:19px}
  .wdbody .task{padding:7px 0}
  .wdbody .task .t{font-size:12.5px;line-height:1.4}
  .wdbody .task .del{padding:0 2px}
  .pagehead .over{font-size:12px}
  .dcell{padding:14px 4px 13px;border-radius:18px}
  .dcell .dn{font-size:11.5px}
  .dcell .dnum{font-size:24px;margin-top:4px}
  .dcell .dtpl{font-size:12px;height:17px}
  .dcell .dbar{height:4px;margin:8px 10px 0}
  .dcell .dchk{width:17px;height:17px;font-size:10px;top:8px;right:8px}
  .dcell .dt{font-size:22px;margin:5px 0 2px}
  .card:hover{transform:translateY(-1px);box-shadow:0 2px 2px rgba(0,0,0,.18),0 12px 32px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.03)}
  .task{padding:13px 6px}
  .task .box{width:25px;height:25px;min-width:25px}
  .result{padding:14px 4px}
  .status{font-size:12.5px;min-width:100px;padding:7px 13px}
  .nums{gap:14px}
  .num{padding:20px 10px;border-radius:18px}
  .num .v{font-size:32px}
  .num .l{font-size:12.5px}
  .mgrid{gap:8px}
  .mday{font-size:14.5px;border-radius:13px}
  .coin{padding:16px 19px;border-radius:18px}
  .hero .hi{font-size:34px}
  .seal{width:205px;height:205px}
  .seal .in{font-size:19px}
  .nextstep{font-size:20px}
  #tabbar{justify-content:center;gap:38px;padding:10px 6px calc(10px + env(safe-area-inset-bottom))}
  #tabbar button{font-size:12px;padding:6px 14px}
  #tabbar button .g{font-size:20px}
  .wk2{display:grid;grid-template-columns:1fr 1.35fr;gap:24px;align-items:start}
}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(88px + env(safe-area-inset-bottom));
  max-width:calc(100vw - 28px);
  background:var(--s3);color:var(--paper);padding:9px 9px 9px 16px;border-radius:14px;
  display:flex;gap:12px;align-items:center;z-index:60;
  box-shadow:0 8px 24px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);font-size:14px;
  animation:tup .28s cubic-bezier(.3,1.4,.5,1)}
@keyframes tup{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
.hero{position:relative;min-height:70vh;display:flex;flex-direction:column;justify-content:center;text-align:center;gap:6px;padding:0 8px;overflow:visible}
.hero .hi{font-family:"Unbounded";font-size:26px;font-weight:700;line-height:1.4;min-height:2.8em}
.hero .sub2{color:var(--dim);font-size:15px;line-height:1.8}
.aurora{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.aurora i{position:absolute;border-radius:50%;filter:blur(70px);opacity:.16}
.aurora i:nth-child(1){width:420px;height:420px;background:var(--acc);top:-12%;left:-14%}
.aurora i:nth-child(2){width:360px;height:360px;background:var(--calm);top:24%;right:-16%}
.aurora i:nth-child(3){width:300px;height:300px;background:var(--acc-deep);bottom:-10%;left:22%}
@media (prefers-reduced-motion:no-preference){
  .aurora i:nth-child(1){animation:fl1 26s ease-in-out infinite alternate}
  .aurora i:nth-child(2){animation:fl2 32s ease-in-out infinite alternate}
  .aurora i:nth-child(3){animation:fl3 38s ease-in-out infinite alternate}
  @keyframes fl1{to{transform:translate(70px,50px) scale(1.15)}}
  @keyframes fl2{to{transform:translate(-60px,-40px) scale(1.1)}}
  @keyframes fl3{to{transform:translate(40px,-60px) scale(1.2)}}

function iso(d){const z=n=>String(n).padStart(2,"0");return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate())}

  if(!S.days[dISO].blocksDone)S.days[dISO].blocksDone={};return S.days[dISO]}
function week(mISO){if(!S.weeks[mISO])S.weeks[mISO]={results:[],marks:{},verdict:null,ritualDone:false,pool:[]};
  if(!S.weeks[mISO].pool)S.weeks[mISO].pool=[];return S.weeks[mISO]}

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function streak(){let n=0,d=todayISO();if(!day(d).closed)d=addDays(d,-1);
  while(S.days[d]&&S.days[d].closed){n++;d=addDays(d,-1)}return n}
function winsThisMonth(){const m=curMonth();return S.wins.filter(w=>w.date.startsWith(m)).length}
function weekStats(){const vs=Object.values(S.weeks).filter(w=>w.verdict);return {ok:vs.filter(w=>w.verdict==="успешна").length,total:vs.length}}
function plural(n){const m=n%10,h=n%100;if(m===1&&h!==11)return"день";if(m>=2&&m<=4&&(h<10||h>=20))return"дня";return"дней"}

function startTyping(){
  const el=q("#typegreet");if(!el||el.dataset.done)return;
  el.dataset.done="1";
  const full=el.getAttribute("data-text")||"";
  if(window._typedOnce){
    el.textContent=full;
    const c0=q("#caret");if(c0)c0.style.opacity="0";
    const qb0=q("#qblock");if(qb0)qb0.classList.add("show");
    return;
  }
  const reduced=typeof matchMedia!=="undefined"&&matchMedia("(prefers-reduced-motion: reduce)").matches;
  const fin=()=>{window._typedOnce=true;const qb=q("#qblock");if(qb)qb.classList.add("show")};
  if(reduced){el.textContent=full;const c=q("#caret");if(c)c.remove();fin();return}
  let i=0;
  const tick=()=>{
    if(i<=full.length){el.textContent=full.slice(0,i);i++;setTimeout(tick,i<3?260:42)}
    else{setTimeout(()=>{const c=q("#caret");if(c)c.style.opacity="0"},1200);fin()}
  };
  tick();
}
let lastTab=null;
function render(){
  const sy=(typeof window!=="undefined"&&window.scrollY)||0;
  if(S.settings.onboarded&&window._sweepDay!==todayISO()){
    window._sweepDay=todayISO();try{sweepReturns()}catch(e){}
  }
  if(!S.settings.onboarded){
    document.getElementById("app").innerHTML=rOnboard();
    document.getElementById("tabbar").innerHTML="";
    const af=document.getElementById("ob-n");if(af)af.focus();
    save();return;
  }
  document.getElementById("app").innerHTML =
    tab==="today"?rToday():tab==="week"?rWeek():tab==="sprint"?rSprint():tab==="proofs"?rProofs():rBase();
  document.getElementById("tabbar").innerHTML=[
    ["week","VII","Неделя"],["today","◆","Сегодня"],["sprint","→","Спринт"],["proofs","₪","Доказ-ва"],["base","≡","Основа"]
  ].map(([id,g,l])=>`<button class="${tab===id?"on":""}" onclick="go('${id}')"><span class="g">${g}</span>${l}</button>`).join("");
  if(overlay)document.getElementById("app").insertAdjacentHTML("beforeend",overlay);
  if(pendingUndo)document.getElementById("app").insertAdjacentHTML("beforeend",
    `<div class="toast">${esc(pendingUndo.msg)}${pendingUndo.undoFn?`<button class="small" onclick="undoNow()">Вернуть</button>`:""}</div>`);
  const appEl=document.getElementById("app");
  if(appEl.classList){if(tab!==lastTab)appEl.classList.add("enter");else appEl.classList.remove("enter")}
  if(typeof window!=="undefined"&&window.scrollTo){
    if(overlay)window.scrollTo(0,0);
    else if(tab===lastTab)window.scrollTo(0,sy);
    else window.scrollTo(0,0);
  }
  lastTab=tab;
  const af=document.getElementById("af");if(af)af.focus();
  if(typeof setTimeout!=="undefined")try{startTyping()}catch(e){}
  save();
}

    const done=hasSub?(nn>0&&k===nn):!!x.done;

function pickTpl(id){
  const d=day(todayISO());d.template=id;d.collected=true;
  curWeek().marks[todayISO()]=id;
  if(S.sprint&&S.sprint.status==="active"&&S.sprint.nextStep&&id!=="V"
     &&!d.tasks.some(x=>x.src==="спринт"))
    d.tasks.unshift({text:S.sprint.nextStep,done:false,src:"спринт"});
  const y=S.days[addDays(todayISO(),-1)];
  if(y&&y.tomorrow&&y.tomorrow.length){
    y.tomorrow.forEach(t=>{if(!d.tasks.some(x=>x.text===t))d.tasks.push({text:t,done:false,src:"вечерний чек-лист"})});
    y.tomorrow=[];
  }
  S.packs.forEach(p=>{
    const ps=p.season||"all";
    if(p.daily&&(ps==="all"||ps===S.settings.season)&&!d.tasks.some(x=>x.sub&&x.text===p.name))
      d.tasks.push({text:p.name,done:false,src:"",open:false,kind:"block",daily:true,sphere:p.sphere??null,sub:p.items.map(t=>({text:t,done:false}))});
  });
  render();
}
function invade(){const d=day(todayISO());d.template="V";curWeek().marks[todayISO()]="V";render()}
function returnBlocks(dISO,destPool){
  const d=S.days[dISO];if(!d)return 0;let cnt=0;
  for(let j=d.tasks.length-1;j>=0;j--){const x=d.tasks[j];
    const isB=x.kind==="block"||(x.sub&&x.sub.length);
    if(!isB||x.daily)continue;
    const done=x.sub&&x.sub.length?x.sub.every(s2=>s2.done):!!x.done;
    if(!done){d.tasks.splice(j,1);x.src="возврат";x.open=false;destPool.push(x);cnt++}
  }
  return cnt;
}
function sweepReturns(){
  const m=monday(new Date()),w=week(m);let cnt=0;
  for(let i=0;i<7;i++){const dISO=addDays(m,i);if(dISO>=todayISO())break;cnt+=returnBlocks(dISO,w.pool)}
  return cnt;
}

function toggleTask(dISO,i){
  const x=day(dISO).tasks[i];
  if(x.sub){const all=x.sub.length>0&&x.sub.every(s=>s.done);x.sub.forEach(s=>s.done=!all);x.done=!all}
  else x.done=!x.done;
  save();
  const row=q(`.task[data-d="${dISO}"][data-i="${i}"]`);
  if(!row){render();return}
  const done=x.sub?(x.sub.length>0&&x.sub.every(s=>s.done)):!!x.done;
  row.classList.toggle("done",done);
  const b=row.querySelector(".box");if(b)b.setAttribute("aria-checked",String(done));

let proofMonth=curMonth(),proofQ="";
function shiftMonth(n){
  const [y,m]=proofMonth.split("-").map(Number);

  proofMonth=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");render();

function rProofs(){
  const total=Object.values(S.days).filter(d=>d.closed).length,wm=winsThisMonth();
  const mStart=curMonth()+"-01";
  const from=S.settings.createdAt>mStart?S.settings.createdAt:mStart;
  const elapsed=Math.max(1,Math.floor((new Date(todayISO()+"T12:00")-new Date(from+"T12:00"))/864e5)+1);
  const closedM=Object.entries(S.days).filter(([k,d])=>d.closed&&k>=from&&k.startsWith(curMonth())).length;
  const pct=Math.round(closedM/elapsed*100);
  const MONN=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
  let h=`<div class="pagehead"><div class="over">${MONN[new Date().getMonth()]} ${new Date().getFullYear()}</div>
    <div class="rowline"><h1>Доказательства</h1><span class="meta">капитал не сгорает</span></div>
    <div class="glow"></div></div>
    <div class="statband card pad">
      <div class="bigstat">
        <div class="bn">${total}</div>
        <div class="bl">капитал · ${plural(total)} всего<br><span style="color:var(--faint)">не сгорает — копится</span></div>
      </div>
      <div class="sidestats">
        <div><b class="mono">${closedM}/${elapsed}</b><span>${MONN[new Date().getMonth()].toLowerCase()} · ${pct}%</span></div>
        <div><b class="mono">${wm}</b><span>побед за месяц</span></div>
      </div>
    </div>`;
  /* навигация по месяцам архива */
  const [py,pm]=proofMonth.split("-").map(Number);
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <button class="small ghost" onclick="shiftMonth(-1)">‹ пред</button>
    <span style="font-weight:600">${MONN[pm-1]} ${py}</span>
    <button class="small ghost" onclick="shiftMonth(1)" ${proofMonth>=curMonth()?'disabled style="opacity:.3"':""}>след ›</button></div>`;
  const winD=new Set(S.wins.map(w2=>w2.date));
  const first=proofMonth+"-01",startDow=(new Date(first+"T12:00").getDay()+6)%7;
  const nd=new Date(py,pm,0).getDate(),tNum=proofMonth===curMonth()?new Date().getDate():-1;
  h+=`<div class="mgrid">`+DOW.map(d=>`<div class="mday blank" style="aspect-ratio:auto;font-size:10.5px">${d}</div>`).join("")+
    Array(startDow).fill(`<div class="mday blank"></div>`).join("")+
    Array.from({length:nd},(_,k)=>{
      const dn=k+1,dISO=proofMonth+"-"+String(dn).padStart(2,"0");
      const closed=S.days[dISO]&&S.days[dISO].closed;
      const isWin=winD.has(dISO);
      return `<div class="mday ${closed?"on":""} ${dn===tNum&&!closed?"td":""}">${dn}${isWin?`<i class="wm"></i>`:""}</div>`;
    }).join("")+`</div>
    <div class="sub" style="font-size:12px;text-align:center;margin-bottom:14px">закрытые дни</div>`;
  h+=`<div class="addrow"><input type="text" id="pq" placeholder="Поиск по доказательствам · Enter" value="${esc(proofQ)}"
    onkeydown="if(event.key==='Enter'){proofQ=this.value.trim().toLowerCase();render()}">
    ${proofQ?`<button class="small ghost" onclick="proofQ='';render()">Сброс</button>`:""}</div>`;
  const feed=[];
  S.wins.forEach(w=>feed.push({date:w.date,type:"win",t:w.text,n:w.name}));
  Object.entries(S.days).filter(([,d])=>d.closed).forEach(([dISO,d])=>feed.push({date:dISO,type:"day",p:d.produced,u:d.upheld}));
  const shown=feed.filter(f=>proofQ
    ?((f.t||"")+" "+(f.n||"")+" "+(f.p||"")+" "+(f.u||"")).toLowerCase().includes(proofQ)
    :f.date.startsWith(proofMonth));
  if(!shown.length)return h+`<div class="empty">${proofQ?"Ничего не найдено":"В этом месяце закрытых дней нет"}</div>`;
  const groups={};
  shown.forEach(f=>{const m=monday(new Date(f.date+"T12:00"));(groups[m]=groups[m]||[]).push(f)});
  Object.keys(groups).sort((a,b)=>b<a?-1:1).forEach(m=>{
    const w=S.weeks[m],v=w&&w.verdict;
    const wc=[0,1,2,3,4,5,6].filter(k2=>{const d2=S.days[addDays(m,k2)];return d2&&d2.closed}).length;
    h+=`<div class="wgroup"><div class="wghead">
      <span class="wt">${human(m)} — ${human(addDays(m,6))} <span style="color:var(--faint);font-weight:400">· ${wc}/7</span></span>
      ${v?`<span class="verdict ${v==="успешна"?"ok":""}">${v}</span>`:""}</div>`+
      groups[m].sort((a,b)=>b.date<a.date?-1:1).map(f=>{

           <div class="cbody"><div class="date">◆ победа${f.n?" · "+esc(f.n):""}</div><div class="p">${esc(f.t)}</div></div></div>`
        :`<div class="coin"><div class="cdate"><b>${dnn}</b><span>${dw}</span></div>
           <div class="cbody"><div class="p">${esc(f.p)||"<span class='sub'>—</span>"}</div>
           ${f.u?`<div class="u">${esc(f.u)}</div>`:""}</div></div>`;
      }).join("")+
    `</div>`;
  });
  return h;
}

(function(){
  let el=null,sx=0,dx=0;
  document.addEventListener("touchstart",e=>{
    el=e.target.closest&&e.target.closest(".task[data-d]");if(!el)return;
    sx=e.touches[0].clientX;dx=0;el.style.transition="none";
  },{passive:true});
  document.addEventListener("touchmove",e=>{
    if(!el)return;dx=e.touches[0].clientX-sx;
    const r=Math.max(-110,Math.min(110,dx*0.85));
    el.style.transform="translateX("+r+"px)";
    el.style.backgroundColor=dx>44?"rgba(76,175,125,.22)":dx<-44?"rgba(176,90,74,.22)":"";
    if(Math.abs(dx)>64&&!el._hp){el._hp=1;if(navigator.vibrate){try{navigator.vibrate(8)}catch(_){}}}
  },{passive:true});
  document.addEventListener("touchend",()=>{
    if(!el)return;
    const t=el,d=t.dataset.d,i=Number(t.dataset.i),fdx=dx;
    t.style.transition="transform .18s,background-color .25s";t.style.transform="";t.style.backgroundColor="";t._hp=0;
    if(Math.abs(fdx)>12)t.addEventListener("click",ev=>{ev.stopPropagation();ev.preventDefault()},{capture:true,once:true});
    if(fdx>64)toggleTask(d,i);else if(fdx<-64)delTask(d,i);
    el=null;dx=0;
  },{passive:true});
})();

/* ===== облачная синхронизация (Supabase) ===== */
function syncCfg(){const t=S.settings;return t.syncUrl&&t.syncKey&&t.syncId}
function syncHeaders(){const t=S.settings;return {apikey:t.syncKey,Authorization:"Bearer "+t.syncKey,
  "Content-Type":"application/json","x-sync-id":t.syncId}}
async function syncPush(manual){
  if(typeof fetch==="undefined")return;
  if(!syncCfg()){if(manual)alert("Сначала настрой синхронизацию: URL, ключ и код связки");return}
  try{
    const body=JSON.stringify({id:S.settings.syncId,data:S,updated_at:new Date().toISOString()});
    const r=await fetch(S.settings.syncUrl.replace(/\/+$/,"")+"/rest/v1/life_os",{method:"POST",
      headers:Object.assign(syncHeaders(),{Prefer:"resolution=merge-duplicates"}),body});
    if(!r.ok)throw new Error(r.status);
    S.settings.lastSyncAt=new Date().toISOString();
    window._lastPush=JSON.stringify(S);
    localStorage.setItem(KEY,window._lastPush);
    if(manual)showInfo("Отправлено в облако ✓");
  }catch(e){if(manual)alert("Не отправилось: проверь URL, ключ и интернет ("+e.message+")")}
}
async function syncPull(manual){
  if(typeof fetch==="undefined")return;
  if(!syncCfg()){if(manual)alert("Сначала настрой синхронизацию");return}
  try{
    const r=await fetch(S.settings.syncUrl.replace(/\/+$/,"")+"/rest/v1/life_os?id=eq."+
      encodeURIComponent(S.settings.syncId)+"&select=data,updated_at",{headers:syncHeaders()});
    if(!r.ok)throw new Error(r.status);
    const rows=await r.json();
    if(!rows.length){if(manual)alert("В облаке пока пусто — сначала «Отправить» с основного устройства");return}
    const remote=rows[0];
    if(manual&&!confirm("Забрать данные из облака от "+new Date(remote.updated_at).toLocaleString("ru")+"? Локальные будут заменены."))return;
    const keep={syncUrl:S.settings.syncUrl,syncKey:S.settings.syncKey,syncId:S.settings.syncId,syncAuto:S.settings.syncAuto};
    const data=remote.data;Object.assign(data.settings,keep);
    data.settings.lastSyncAt=new Date().toISOString();
    localStorage.setItem(KEY,JSON.stringify(data));S=load();
    window._lastPush=JSON.stringify(S);
    applyAccent();applyPrefs();overlay=null;render();
    if(manual)showInfo("Данные из облака получены ✓");
  }catch(e){if(manual)alert("Не забралось: "+e.message)}
}
function scheduleSync(){
  if(!S.settings.syncAuto||!syncCfg())return;
  if(window._lastPush===JSON.stringify(S))return;
  clearTimeout(window._syncT);
  window._syncT=setTimeout(()=>{
    const ae=typeof document!=="undefined"&&document.activeElement;
    if(ae&&(ae.tagName==="INPUT"||ae.tagName==="TEXTAREA")){scheduleSync();return}
    syncPush(false);
  },4000);
}
function genSyncId(){
  const a="abcdefghjkmnpqrstuvwxyz23456789";let t="";
  for(let i=0;i<24;i++)t+=a[Math.floor(Math.random()*a.length)];
  S.settings.syncId=t;render();
}
function syncSaveCfg(){
  const g=id=>((document.getElementById(id)||{}).value||"").trim();
  S.settings.syncUrl=g("sy-url");S.settings.syncKey=g("sy-key");
  const sid=g("sy-id");if(sid)S.settings.syncId=sid;
  render();showInfo("Настройки синхронизации сохранены");
}
if(typeof navigator!=="undefined"&&"serviceWorker" in navigator&&
   typeof location!=="undefined"&&location.protocol.indexOf("http")===0){
  try{
    navigator.serviceWorker.register("./sw.js").then(reg=>{
      window._swReg=reg;
      try{reg.update()}catch(e){}
      setInterval(()=>{try{reg.update()}catch(e){}},60*60*1000);
    });
    let refreshed=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(refreshed)return;refreshed=true;location.reload();
    });
  }catch(e){}
}
async function checkUpdates(){
  if(typeof navigator==="undefined"||!("serviceWorker" in navigator)){alert("Доступно только в установленной версии");return}
  try{
    const reg=window._swReg||await navigator.serviceWorker.getRegistration();
    if(reg){await reg.update();showInfo("Проверено — если есть новое, перезапустится само")}
    else location.reload();
  }catch(e){alert("Не удалось проверить: "+e.message)}
}
if(typeof window!=="undefined"&&window.addEventListener){
  window.addEventListener("resize",()=>{clearTimeout(window._rz);
    window._rz=setTimeout(()=>{if(!overlay)render()},180)});
}
applyAccent();
applyPrefs();
render();
if(S.settings.syncAuto&&syncCfg())setTimeout(()=>syncPull(false),900);
</script>
</body>
</html>
